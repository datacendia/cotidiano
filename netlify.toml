# Cotidiano — static PWA, no build step
[build]
  publish = "."

# Service worker must always be fetched fresh so updates roll out
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Manifest should be served with the right MIME type
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

# Long-cache static assets (versioned via SW)
[[headers]]
  for = "/icon.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# SPA-style fallback so deep links resolve to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
